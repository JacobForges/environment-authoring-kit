# CodeQL for environment-authoring-kit (Unity C# + cave-grader TypeScript).
# Unity cannot run on ubuntu-latest; C# uses build-mode: none (source-based, no msbuild/Unity).
name: CodeQL

# Cloud fallback only — does not replace Unity self-hosted (see codeql-unity-selfhosted.yml).
on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 0"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp, javascript-typescript
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
