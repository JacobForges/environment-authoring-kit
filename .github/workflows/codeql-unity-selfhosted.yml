# CodeQL with full C# accuracy: self-hosted runner + Unity batchmode + msbuild.
# Requires: GitHub Actions self-hosted runner on a Mac/PC with Unity + .NET SDK.
# Repo variable: UNITY_PATH → Unity Editor binary.
name: CodeQL (Unity self-hosted)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: codeql-unity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  csharp-unity:
    name: C# (Unity compile)
    runs-on: self-hosted
    timeout-minutes: 90
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Require UNITY_PATH variable
        env:
          UNITY_PATH: ${{ vars.UNITY_PATH }}
        run: |
          if [[ -z "${UNITY_PATH}" ]]; then
            echo "::error::Repository variable UNITY_PATH is not set. Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi
          if [[ ! -x "${UNITY_PATH}" ]]; then
            echo "::error::UNITY_PATH is not executable on this runner: ${UNITY_PATH}"
            exit 1
          fi

      - name: Unity — regenerate solution and compile scripts
        env:
          UNITY_PATH: ${{ vars.UNITY_PATH }}
        run: |
          chmod +x Packages/com.cursor.environment-authoring-kit/Tools/run-codeql-unity-prep.sh
          Packages/com.cursor.environment-authoring-kit/Tools/run-codeql-unity-prep.sh

      - name: Initialize CodeQL (manual build)
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build C# for CodeQL tracing
        run: |
          chmod +x Packages/com.cursor.environment-authoring-kit/Tools/codeql-build-csharp.sh
          Packages/com.cursor.environment-authoring-kit/Tools/codeql-build-csharp.sh

      - name: Perform CodeQL Analysis (C#)
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"

      - name: Upload Unity prep log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-unity-prep-log
          path: Logs/codeql-unity-prep.log
          if-no-files-found: ignore

  typescript-grader:
    name: TypeScript (cave-grader)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis (TypeScript)
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
