# Nightly showcase bake only — never runs on push/PR (does not slow local or CI on every commit).
name: Environment Kit — showcase nightly

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 08:00 UTC daily
    - cron: "0 8 * * *"
  workflow_dispatch:

concurrency:
  group: environment-kit-showcase-nightly
  cancel-in-progress: true

jobs:
  showcase-headless:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Showcase headless (self-hosted Unity)
        env:
          UNITY_PATH: ${{ vars.UNITY_PATH }}
        run: |
          chmod +x Packages/com.cursor.environment-authoring-kit/Tools/run-showcase-headless.sh
          Packages/com.cursor.environment-authoring-kit/Tools/run-showcase-headless.sh

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: showcase-headless-log
          path: Logs/showcase-headless.log
          if-no-files-found: ignore
